---  
- name: Update apt cache 
  ansible.builtin.apt:
    update_cache: yes

- name: Add Docker's dependencies 
  ansible.builtin.apt:
    name: "{{docker_dependencies}}"
    state: latest
    update_cache: yes
        
- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker GPG key
  shell: |
    curl -fsSL {{ docker_gpg }} | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Set permission for Docker GPG key
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] {{ docker_repo }} {{ ansible_facts['distribution_release'] }} stable"
    state: present

- name: Update apt cache after adding repo
  apt:
    update_cache: yes

- name: Install Docker Compose packages
  ansible.builtin.apt:
    name: "{{dockercompose_packages}}"
    state: latest
    update_cache: yes
